--- 
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public-nodered-route
  namespace: applications
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
    sectionName: https
    kind: Gateway 
  hostnames:
  - "nxito.me"
  - "test.nxito.me"
  rules:
      # Regla 1: Denegar acceso a la administración
    - matches:
      - path:
          type: PathPrefix
          value: /app/admin
      # BackendRef sera 404

    - matches:
      - path:
          type: PathPrefix
          value: /app
      backendRefs:
      - name: node-red-service
        port: 1880
 
        
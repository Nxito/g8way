# License: Apache License 2.0
# apiVersion: traefik.io/v1alpha1
# kind: Middleware
# metadata:
#   name: oauth2-proxy-auth
#   namespace: applications
# spec:
#   forwardAuth:
#     # URL interna del proxy
#     # Si hay cookie ->   responde 202 (gracias al flag upstream).
#     # Si NO hay cookie -> responde 401.
#     address: http://oauth2-proxy-service.authorization.svc.cluster.local:4180/oauth2/ # oauth2/start?rd=https://nxito.local/
#     trustForwardHeader: true
#     # Cabeceras que el Proxy le devuelve a Traefik para identificar al usuario
#     authResponseHeaders:
#       - X-Auth-Request-User
#       - X-Auth-Request-Email
#       - X-Auth-Request-Access-Token
#       - Authorization
#       - Set-Cookie
# ---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-auth
  namespace: applications
spec:
  forwardAuth:
    address: http://oauth2-proxy-service.authorization.svc.cluster.local:4180/
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
      - X-Auth-Request-Groups
      - X-Auth-Request-Access-Token
      - X-Forwarded-User
      - Authorization
      - Set-Cookie
      - Cookie
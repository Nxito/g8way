apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: g8way
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    path: config/
    repoURL: https://github.com/Nxito/g8way
    targetRevision: HEAD
    directory:
      recurse: true
  sources: []
  project: default
